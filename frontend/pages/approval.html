<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPRIOS</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../assets/fontawesome/css/all.min.css">
</head>
<body>
<div class="app" data-screen-label="Persetujuan Akun">
  <div id="shell-sidebar"></div>
  <div class="main">
    <div id="shell-topbar"></div>
    <div class="content">
      <div class="content__inner">

        <nav class="breadcrumb"><a href="../index.html">Dashboard</a><span class="sep">&rsaquo;</span><span>Persetujuan Akun</span></nav>
        <div class="page-hero">
          <h1>Persetujuan Akun Kepala Desa</h1>
          <p>Tinjau surat keterangan yang diunggah pendaftar, lalu setujui atau tolak permohonan akun Kepala Desa.</p>
          <div class="batik-rule"></div>
        </div>

        <div class="stat-grid" id="statGrid"></div>

        <div class="card card--pad-lg">
          <div class="section-head"><div><span class="eyebrow"><span class="diamond">&#9670;</span> Menunggu Persetujuan</span><h2 style="font-size:20px;margin-top:4px;">Permohonan Akun Masuk</h2></div></div>
          <div id="tableArea"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="../js/core.js"></script>
<script>
(function () {
  var S = window.SIPRIOS;
  if (!S.renderShell({ active: "/pages/approval.html", title: "Persetujuan Akun", requireRole: "admin" })) return;

  function load() {
    S.overlay(true, "Memuat data...");
    return S.Auth.pending().then(function (pending) {
      S.overlay(false);
      render(pending);
    }).catch(function (err) {
      S.overlay(false);
      S.toast(err.message || "Gagal memuat permohonan akun.", "error");
      render([]);
    });
  }

  function render(pending) {
    var cards = [
      { label: "Menunggu Persetujuan", value: pending.length, hint: "Permohonan Kepala Desa", gold: false }
    ];
    document.getElementById("statGrid").innerHTML = cards.map(function (c) {
      var empty = c.value === 0 ? " is-empty" : "";
      return '<div class="stat-card ' + (c.gold ? "accent-gold" : "") + '"><div class="label">' + c.label + '</div>' +
        '<div class="value' + empty + '">' + c.value + '</div><div class="hint">' + c.hint + '</div></div>';
    }).join("");

    var area = document.getElementById("tableArea");
    if (pending.length === 0) {
      area.innerHTML = '<div class="empty"><div class="ic empty-icon"><i class="fa-solid fa-circle-check"></i></div><h3>Tidak ada permohonan tertunda</h3>' +
        '<p>Semua pendaftaran Kepala Desa sudah ditinjau. Permohonan baru akan muncul di sini.</p></div>';
      return;
    }

    var rows = pending.map(function (u) {
      var suratBtn = u.suratUrl
        ? '<button class="btn btn--ghost" data-act="lihat" data-user="' + u.username + '" style="min-height:auto;padding:6px 14px;"><i class="fa-solid fa-file-pdf btn-icon"></i>Lihat Surat</button>'
        : '<span style="font-size:13px;color:var(--color-muted);">Tidak ada surat</span>';
      return '<tr>' +
        '<td><b>' + u.nama + '</b></td>' +
        '<td class="kk-no">' + u.username + '</td>' +
        '<td style="color:var(--color-muted)">' + S.tanggalID(u.tanggal) + '</td>' +
        '<td>' + suratBtn + '</td>' +
        '<td><div style="display:flex;gap:8px;flex-wrap:wrap;">' +
          '<button class="btn btn--primary" data-act="setuju" data-user="' + u.username + '" style="min-height:auto;padding:7px 16px;"><i class="fa-solid fa-check btn-icon"></i>Setujui</button>' +
          '<button class="btn btn--ghost" data-act="tolak" data-user="' + u.username + '" style="min-height:auto;padding:7px 16px;color:var(--color-danger);border-color:var(--color-danger);"><i class="fa-solid fa-xmark btn-icon"></i>Tolak</button>' +
        '</div></td>' +
        '</tr>';
    }).join("");

    area.innerHTML = '<div class="table-wrap"><table class="tbl"><thead><tr>' +
      '<th>Nama Pendaftar</th><th>Username</th><th>Tanggal Daftar</th><th>Surat Bukti</th><th>Tindakan</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div>';

    function doApprove(username, nama) {
      S.overlay(true, "Memproses...");
      S.Auth.approve(username).then(function () {
        S.overlay(false);
        S.toast(nama + " disetujui. Kepala Desa kini dapat masuk.", "success");
        load();
      }).catch(function (err) {
        S.overlay(false);
        S.toast(err.message || "Gagal menyetujui permohonan.", "error");
      });
    }

    function doReject(username, nama) {
      S.overlay(true, "Memproses...");
      S.Auth.reject(username).then(function () {
        S.overlay(false);
        S.toast("Permohonan ditolak.", "info");
        load();
      }).catch(function (err) {
        S.overlay(false);
        S.toast(err.message || "Gagal menolak permohonan.", "error");
      });
    }

    area.querySelectorAll("button[data-act]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var username = btn.getAttribute("data-user");
        var act = btn.getAttribute("data-act");
        var u = pending.find(function (x) { return x.username === username; });
        if (act === "lihat") {
          if (!u || !u.suratUrl) { S.toast("Surat tidak tersedia.", "error"); return; }
          S.openModal(
            '<button class="close" data-close><i class="fa-solid fa-xmark"></i></button>' +
            '<h3 style="margin-bottom:8px;">Surat Keterangan</h3>' +
            '<p style="font-size:13px;color:var(--color-muted);margin:0 0 16px;">Pendaftar: <b>' + u.nama + '</b> (' + u.username + ')</p>' +
            '<iframe src="' + u.suratUrl + '" style="width:100%;height:62vh;border:1px solid var(--color-border);border-radius:8px;background:#fff;"></iframe>' +
            '<div style="display:flex;gap:12px;margin-top:16px;">' +
              '<button class="btn btn--ghost btn--block" data-close>Tutup</button>' +
              '<button class="btn btn--primary btn--block" id="approveFromModal"><i class="fa-solid fa-check btn-icon"></i>Setujui Pendaftar</button>' +
            '</div>'
          );
          var bd = document.getElementById("sipriosModal");
          bd.querySelector(".modal").style.maxWidth = "720px";
          bd.querySelectorAll("[data-close]").forEach(function (b) { b.addEventListener("click", S.closeModal); });
          bd.querySelector("#approveFromModal").addEventListener("click", function () {
            S.closeModal();
            doApprove(username, u.nama);
          });
        } else if (act === "setuju") {
          doApprove(username, u ? u.nama : username);
        } else if (act === "tolak") {
          S.openConfirm("Tolak Permohonan", "Permohonan akun \"" + (u ? u.nama : "") + "\" akan dihapus. Lanjutkan?", function () {
            doReject(username, u ? u.nama : username);
          });
        }
      });
    });
  }

  load();
})();
</script>
</body>
</html>
